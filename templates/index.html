<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS → PySpark Converter</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1c2230;
    --border:    #21262d;
    --border2:   #30363d;
    --accent:    #f78166;
    --accent2:   #79c0ff;
    --green:     #56d364;
    --yellow:    #e3b341;
    --text:      #c9d1d9;
    --text-dim:  #8b949e;
    --text-mute: #484f58;
    --sas:       #e3b341;
    --spark:     #79c0ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* subtle scanline texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .brand-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #000;
  }

  .brand em { color: var(--accent2); font-style: normal; }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .pill {
    background: rgba(86,211,100,0.1);
    border: 1px solid rgba(86,211,100,0.25);
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── EXAMPLE STRIP ── */
  .example-strip {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .example-strip::-webkit-scrollbar { display: none; }

  .strip-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    margin-right: 4px;
  }

  .ex-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .ex-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(121,192,255,0.06);
  }

  /* ── MAIN EDITOR AREA ── */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    padding: 24px 32px;
    align-items: start;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 560px;
  }

  .panel-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
  }

  .lang-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot-sas   { background: var(--sas);   box-shadow: 0 0 6px var(--sas); }
  .dot-spark { background: var(--spark); box-shadow: 0 0 6px var(--spark); }

  .panel-actions { display: flex; gap: 6px; }

  .ico-btn {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text-mute);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ico-btn:hover { border-color: var(--text-dim); color: var(--text); }

  /* line numbers + editor */
  .editor-wrap {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .line-nums {
    background: var(--surface2);
    border-right: 1px solid var(--border);
    padding: 16px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-mute);
    line-height: 1.65;
    text-align: right;
    user-select: none;
    min-width: 40px;
    overflow: hidden;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.65;
    padding: 16px;
    resize: none;
    tab-size: 2;
  }
  textarea::placeholder { color: var(--text-mute); }

  .output-body {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.65;
    padding: 16px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--text);
  }

  .output-body.empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-mute);
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; opacity: 0.4; }

  /* syntax colours */
  .t-kw   { color: #ff7b72; }   /* keywords */
  .t-fn   { color: #d2a8ff; }   /* functions */
  .t-str  { color: #a5d6ff; }   /* strings */
  .t-cm   { color: var(--text-mute); font-style: italic; }  /* comments */
  .t-num  { color: #f2cc60; }   /* numbers */
  .t-op   { color: #79c0ff; }   /* operators */

  /* ── MIDDLE ARROW ── */
  .convert-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    gap: 12px;
    min-height: 560px;
  }

  .btn-convert {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-convert::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateY(100%);
    transition: transform 0.2s;
  }
  .btn-convert:hover { transform: scale(1.04); box-shadow: 0 0 24px rgba(247,129,102,0.4); }
  .btn-convert:hover::before { transform: translateY(0); }
  .btn-convert:active { transform: scale(0.97); }
  .btn-convert:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .arrow-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .arrow-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border2);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  .arrow-dot:nth-child(2) { animation-delay: 0.3s; }
  .arrow-dot:nth-child(3) { animation-delay: 0.6s; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); background: var(--accent); }
  }

  .converting .arrow-dot { background: var(--accent); animation: pulse-dot 0.4s ease-in-out infinite; }

  /* ── STATUS BAR ── */
  .status-bar {
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-mute);
  }

  .status-left { display: flex; align-items: center; gap: 12px; }
  .status-ok   { color: var(--green); }
  .status-err  { color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 32px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-mute);
  }

  .footer-caps {
    display: flex;
    gap: 16px;
  }

  .cap-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cap-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.25s;
    z-index: 500;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.err  { border-color: var(--accent); color: var(--accent); }

  /* ── SPINNER ── */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .workspace { grid-template-columns: 1fr; padding: 16px; }
    .convert-col { flex-direction: row; min-height: auto; padding: 12px 0; }
    .btn-convert { writing-mode: horizontal-tb; }
    .arrow-track { flex-direction: row; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="brand-icon">⚡</div>
    SAS <em>→</em> PySpark
  </div>
  <div class="header-meta">
    <span class="pill">● RULE-BASED ENGINE</span>
  </div>
</header>

<!-- EXAMPLE STRIP -->
<div class="example-strip">
  <span class="strip-label">Examples</span>
  <button class="ex-btn" onclick="loadExample('proc_sql')">PROC SQL</button>
  <button class="ex-btn" onclick="loadExample('data_step')">DATA Step</button>
  <button class="ex-btn" onclick="loadExample('proc_means')">PROC MEANS</button>
  <button class="ex-btn" onclick="loadExample('proc_sort')">PROC SORT</button>
  <button class="ex-btn" onclick="loadExample('merge')">MERGE</button>
  <button class="ex-btn" onclick="loadExample('proc_freq')">PROC FREQ</button>
  <button class="ex-btn" onclick="loadExample('proc_print')">PROC PRINT</button>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- SAS PANEL -->
  <div class="panel">
    <div class="panel-top">
      <div class="panel-label">
        <div class="lang-dot dot-sas"></div>
        SAS Input
      </div>
      <div class="panel-actions">
        <button class="ico-btn" onclick="clearInput()" title="Clear">✕</button>
      </div>
    </div>
    <div class="editor-wrap">
      <div class="line-nums" id="lineNums">1</div>
      <textarea id="sasInput"
        placeholder="/* Paste your SAS code here */"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
      ></textarea>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <span id="lineCount">0 lines</span>
        <span id="charCount">0 chars</span>
      </div>
      <span>SAS 9.4</span>
    </div>
  </div>

  <!-- CONVERT COLUMN -->
  <div class="convert-col" id="convertCol">
    <button class="btn-convert" id="convertBtn" onclick="doConvert()">
      <span id="btnContent">▶ Convert</span>
    </button>
    <div class="arrow-track" id="arrowTrack">
      <div class="arrow-dot"></div>
      <div class="arrow-dot"></div>
      <div class="arrow-dot"></div>
    </div>
  </div>

  <!-- PYSPARK PANEL -->
  <div class="panel">
    <div class="panel-top">
      <div class="panel-label">
        <div class="lang-dot dot-spark"></div>
        PySpark Output
      </div>
      <div class="panel-actions">
        <button class="ico-btn" onclick="copyOutput()" title="Copy to clipboard">⎘</button>
        <button class="ico-btn" onclick="downloadOutput()" title="Download .py">↓</button>
      </div>
    </div>
    <div class="output-body empty" id="outputArea">
      <div class="empty-icon">⚡</div>
      <span>PySpark code appears here</span>
    </div>
    <div class="status-bar">
      <div class="status-left">
        <span id="outputStatus">—</span>
      </div>
      <span>PySpark 3.x</span>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <div class="footer-caps">
    <div class="cap-item"><div class="cap-dot" style="background:var(--yellow)"></div> PROC SQL</div>
    <div class="cap-item"><div class="cap-dot" style="background:var(--green)"></div> DATA Step</div>
    <div class="cap-item"><div class="cap-dot" style="background:var(--spark)"></div> PROC MEANS</div>
    <div class="cap-item"><div class="cap-dot" style="background:var(--accent)"></div> PROC SORT</div>
    <div class="cap-item"><div class="cap-dot" style="background:var(--text-dim)"></div> PROC FREQ / PRINT</div>
  </div>
  <span>No AI · No API · Pure Python</span>
</footer>

<div id="toast"></div>

<script>
// ── EXAMPLES ──
const EXAMPLES = {
  proc_sql: `PROC SQL;
  SELECT e.emp_id, e.name, e.salary, d.dept_name
  FROM work.employees e
  LEFT JOIN work.departments d ON e.dept_id = d.dept_id
  WHERE e.salary > 50000
  ORDER BY e.salary DESC;
QUIT;`,

  data_step: `DATA work.filtered;
  SET work.employees;
  WHERE salary > 50000;
  bonus = salary * 0.1;
  full_name = CATX(' ', first_name, last_name);
  IF age >= 30 THEN seniority = 'Senior';
  ELSE seniority = 'Junior';
RUN;`,

  proc_means: `PROC MEANS DATA=work.sales NOPRINT;
  CLASS region product;
  VAR revenue units;
  OUTPUT OUT=work.summary;
RUN;`,

  proc_sort: `PROC SORT DATA=work.customers OUT=work.customers_sorted NODUPKEY;
  BY customer_id DESCENDING purchase_date;
RUN;`,

  merge: `PROC SORT DATA=work.employees; BY emp_id; RUN;
PROC SORT DATA=work.departments; BY dept_id; RUN;

DATA work.combined;
  MERGE work.employees (IN=a)
        work.departments (IN=b);
  BY emp_id;
  IF a AND b;
RUN;`,

  proc_freq: `PROC FREQ DATA=work.orders;
  TABLES region * product;
RUN;`,

  proc_print: `PROC PRINT DATA=work.employees (OBS=10);
  VAR emp_id name salary department;
RUN;`
};

function loadExample(key) {
  document.getElementById('sasInput').value = EXAMPLES[key];
  updateStats();
}

// ── EDITOR STATS + LINE NUMBERS ──
const sasInput = document.getElementById('sasInput');

function updateStats() {
  const val = sasInput.value;
  const lines = val ? val.split('\n').length : 0;
  document.getElementById('lineCount').textContent = `${lines} lines`;
  document.getElementById('charCount').textContent = `${val.length} chars`;
  updateLineNums(lines);
}

function updateLineNums(n) {
  const nums = document.getElementById('lineNums');
  nums.textContent = Array.from({length: Math.max(n,1)}, (_,i) => i+1).join('\n');
}

sasInput.addEventListener('input', updateStats);
sasInput.addEventListener('scroll', () => {
  document.getElementById('lineNums').scrollTop = sasInput.scrollTop;
});
updateStats();

// ── CONVERT ──
async function doConvert() {
  const code = sasInput.value.trim();
  if (!code) { showToast('Paste some SAS code first', true); return; }

  const btn = document.getElementById('convertBtn');
  const out = document.getElementById('outputArea');
  const arrow = document.getElementById('arrowTrack');

  btn.disabled = true;
  document.getElementById('btnContent').innerHTML = '<span class="spinner"></span>';
  arrow.classList.add('converting');
  out.className = 'output-body empty';
  out.innerHTML = '<div class="empty-icon" style="animation:spin 0.8s linear infinite;display:inline-block">⚡</div><span>Converting…</span>';
  document.getElementById('outputStatus').textContent = 'working…';

  try {
    const res = await fetch('/convert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sas_code: code })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    out.className = 'output-body';
    out.textContent = data.pyspark_code;
    applySyntax(out);

    const outLines = data.pyspark_code.split('\n').length;
    document.getElementById('outputStatus').innerHTML =
      `<span class="status-ok">✓ ${outLines} lines generated</span>`;
    showToast('✓ Conversion complete');

  } catch(e) {
    out.className = 'output-body';
    out.innerHTML = `<span style="color:var(--accent)">⚠ Error: ${e.message}</span>`;
    document.getElementById('outputStatus').innerHTML =
      `<span class="status-err">✗ Error</span>`;
    showToast('Conversion failed', true);
  } finally {
    btn.disabled = false;
    document.getElementById('btnContent').textContent = '▶ Convert';
    arrow.classList.remove('converting');
  }
}

// ── BASIC SYNTAX HIGHLIGHT ──
function applySyntax(el) {
  const kws = ['from','import','spark','as','def','if','else','elif','return','True','False','None','for','in','and','or','not'];
  const fns = ['groupBy','agg','filter','select','orderBy','join','withColumn','dropDuplicates','show','table','describe','count'];

  // Process line by line to avoid comment regex corrupting HTML tags
  const lines = el.textContent.split('\n');

  const highlighted = lines.map(line => {
    // Escape HTML on raw text first
    let l = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // If the line is a comment, highlight whole line and stop
    if (/^\s*#/.test(l)) {
      return `<span class="t-cm">${l}</span>`;
    }

    // Strings
    l = l.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="t-str">$1</span>');
    // Numbers
    l = l.replace(/(?<![a-zA-Z"'_])(\b\d+\.?\d*\b)/g, '<span class="t-num">$1</span>');
    // Functions
    fns.forEach(fn => {
      l = l.replace(new RegExp(`\\b(${fn})\\b`, 'g'), '<span class="t-fn">$1</span>');
    });
    // Keywords
    kws.forEach(kw => {
      l = l.replace(new RegExp(`(?<![\\w])(${kw})(?![\\w])`, 'g'), '<span class="t-kw">$1</span>');
    });

    return l;
  });

  el.innerHTML = highlighted.join('\n');
}

// ── UTILS ──
function clearInput() {
  sasInput.value = '';
  updateStats();
}

function copyOutput() {
  const out = document.getElementById('outputArea');
  if (out.classList.contains('empty')) return;
  navigator.clipboard.writeText(out.innerText).then(() => showToast('✓ Copied to clipboard'));
}

function downloadOutput() {
  const out = document.getElementById('outputArea');
  if (out.classList.contains('empty')) return;
  const blob = new Blob([out.innerText], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted_pyspark.py';
  a.click();
  showToast('✓ Downloaded');
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'err' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// keyboard shortcut: Ctrl+Enter to convert
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doConvert();
});
</script>
</body>
</html>
